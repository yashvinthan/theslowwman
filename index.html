<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Full Page SVG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover; /* or 'contain' if you want to keep full image inside */
      display: block;
    }
  </style>
</head>
<body>
  <img src="1.svg" alt="Full Page SVG" />
</body>
</html>
